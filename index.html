    height: 70%;

    z-index: 0;

  .nav-btn.active { color: var(--pink-500); }
  .nav-btn-icon { font-size: 22px; }
  .nav-btn-label { font-size: 11px; font-weight: 600; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45, 36, 56, 0.5);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    animation: fadeIn 0.2s;

  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal {
    background: var(--white);
    width: 100%;
    max-width: 500px;
    border-radius: 28px 28px 0 0;

  .modal-handle {

  .chip {
    flex: 1;

    padding: 12px;
    background: var(--cream);
    border: 1.5px solid var(--pink-100);
    border-radius: 12px;

    font-size: 14px;
    font-weight: 600;
    color: var(--gray-700);

    background: var(--gradient-pink);
    color: white;

  .submit-btn {

    padding: 16px;
    background: var(--gradient-pink);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;

  /* Date filter chips */
  .date-filter {
    display: flex;
    gap: 8px;
    padding: 0 16px 16px;
    overflow-x: auto;
    scrollbar-width: none;

  .date-filter::-webkit-scrollbar { display: none; }

  .date-chip {
    flex-shrink: 0;
    padding: 8px 14px;
    background: var(--white);
    border: none;
    border-radius: 100px;
    font-family: inherit;

  /* Bottom nav 5-item adjustment */
  .bottom-nav { padding: 8px 8px 22px; }
  .nav-btn { padding: 8px 6px; }

  /* Empty State */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-500);
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* Auth */
  .auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;

  .auth-card {

    border-radius: 28px;

  .auth-title {

  }

  .toast {
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);

  .chart-wrap {
    position: relative;
    height: 200px;
    margin-top: 8px;

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--pink-500);
  }

  /* Settings */
  .setting-row {
    display: flex;
    justify-content: space-between;

    border-bottom: 1px solid var(--pink-50);

  .setting-label { font-size: 14px; font-weight: 600; color: var(--gray-900); }
  .setting-desc { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

  .switch {
    position: relative;
    width: 48px;
    height: 28px;
    background: var(--gray-300);
    border-radius: 100px;

    transition: background 0.25s;

  /* Setup screen */
  .setup-input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--pink-200);
    border-radius: 14px;
    font-family: inherit;

    background: var(--cream);
    margin-bottom: 10px;
    text-align: right;

  .setup-help {
    background: var(--blue-50);

  .setup-help code {
    background: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
  }
</style>
</head>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

// ============== SUPABASE SETUP ==============
const SUPABASE_URL = 'https://pkpvdunserlqbsfneqdm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8qcBqILtWbcjpYeEJrBQlg_Ud9u6uxA';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {

const formatTime = (seconds) => {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
};

const formatHebrewDate = (date) => {
  const days = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
  const months = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];
  return `יום ${days[date.getDay()]}, ${date.getDate()} ${months[date.getMonth()]}`;
};

const timeSince = (timestamp) => {
  const seconds = Math.floor((Date.now() - new Date(timestamp).getTime()) / 1000);
  if (seconds < 60) return 'עכשיו';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `לפני ${minutes} ד׳`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `לפני ${hours} ש׳`;
  const days = Math.floor(hours / 24);
  return `לפני ${days} י׳`;
};

const formatClock = (timestamp) => {
  const d = new Date(timestamp);
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
};

const playReminderSound = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const beep = (freq, t, dur) => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.start(t); o.stop(t + dur);
    };
    const t = ctx.currentTime;
    beep(660, t, 0.18); beep(880, t + 0.22, 0.18); beep(1047, t + 0.44, 0.28);
  } catch(e) {}
};

const ActiveTimer = ({ activeTimer, onStop, onCancel }) => {
  const [elapsed, setElapsed] = useState(0);
  const [side, setSide] = useState(activeTimer.side || 'right');

  useEffect(() => {
    const start = new Date(activeTimer.startedAt).getTime();
    const tick = () => setElapsed(Math.floor((Date.now() - start) / 1000));
    tick();
    const interval = setInterval(tick, 1000);
    return () => clearInterval(interval);
  }, [activeTimer.startedAt]);

  const config = EVENT_TYPES[activeTimer.type];
  const isPumping = activeTimer.type === 'pumping';
  const isNursing = activeTimer.type === 'nursing';

  return (
    <div className={`timer-card ${isPumping ? 'blue' : ''}`}>
      <div className="timer-label">
        <span className="pulse">●</span> {config.icon} {config.label} - פעיל

      {isNursing && (

            className={`side-btn ${side === 'right' ? 'active' : ''}`}
            onClick={() => setSide('right')}

          <button
            className={`side-btn ${side === 'left' ? 'active' : ''}`}

const toLocalInputValue = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
};

const EditEventModal = ({ event, onSave, onClose }) => {
  const config = EVENT_TYPES[event.event_type];
  const hasSide = event.event_type === 'nursing' || event.event_type === 'pumping';
  const hasAmount = event.event_type === 'bottle' || event.event_type === 'pumping';
  const hasDuration = event.event_type === 'nursing' || event.event_type === 'pumping' || event.event_type === 'bottle' || event.event_type === 'sleep';

  const [startedAt, setStartedAt] = useState(toLocalInputValue(event.started_at));
  const [endedAt, setEndedAt] = useState(toLocalInputValue(event.ended_at));
  const [amount, setAmount] = useState(event.amount_ml ?? '');
  const [side, setSide] = useState(event.side || 'right');
  const [notes, setNotes] = useState(event.notes || '');

  const handleSave = () => {
    if (!startedAt) return;
    const startDate = new Date(startedAt);
    const endDate = endedAt ? new Date(endedAt) : null;
    if (endDate && endDate < startDate) {
      alert('שעת סיום קודמת לשעת התחלה');
      return;
    }
    const patch = {
      started_at: startDate.toISOString(),
      ended_at: endDate ? endDate.toISOString() : null,
      duration_seconds: endDate ? Math.floor((endDate - startDate) / 1000) : null,
      notes: notes.trim() || null
    };
    if (hasAmount) patch.amount_ml = amount === '' ? null : parseInt(amount);
    if (hasSide) patch.side = side;
    onSave(patch);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-handle"></div>
        <h2 className="modal-title">{config.icon} עריכת {config.label}</h2>

          <label className="form-label">התחלה</label>

            type="datetime-local"

            onChange={(e) => setStartedAt(e.target.value)}

        {hasDuration && (
          <div className="form-group">
            <label className="form-label">סיום (אופציונלי)</label>

              type="datetime-local"
              className="form-input"
              value={endedAt}
              onChange={(e) => setEndedAt(e.target.value)}
            />
          </div>
        )}

        {hasAmount && (
          <div className="form-group">
            <label className="form-label">כמות (מ״ל)</label>
            <input
              type="number"
              className="form-input"
              placeholder="לדוגמה: 120"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
              inputMode="numeric"
            />
          </div>
        )}

        {hasSide && (
          <div className="form-group">
            <label className="form-label">{event.event_type === 'nursing' ? 'איזה צד' : 'מאיזה שד'}</label>

// ============== STATS VIEW ==============
const StatsView = ({ events }) => {
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  // null = weekly view, Date object = specific day view
  const [selectedDay, setSelectedDay] = useState(null);

  // Build list of last 7 days for the filter
  const filterDays = useMemo(() => Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - i); return d;
  }), []);

  const dayLabel = (d, i) => i === 0 ? 'היום' : i === 1 ? 'אתמול' : `${d.getDate()}/${d.getMonth() + 1}`;

  const getDayStats = (day) => {
    const next = new Date(day); next.setDate(next.getDate() + 1);
    const evts = events.filter(e => { const t = new Date(e.started_at); return t >= day && t < next; });
    return {
      feeds: evts.filter(e => ['nursing', 'bottle'].includes(e.event_type)).length,
      nursing: evts.filter(e => e.event_type === 'nursing').length,
      bottle: evts.filter(e => e.event_type === 'bottle').length,
      pumping: evts.filter(e => e.event_type === 'pumping').length,
      pumpingMl: evts.filter(e => e.event_type === 'pumping').reduce((s, e) => s + (e.amount_ml || 0), 0),
      pee: evts.filter(e => e.event_type === 'pee').length,
      poo: evts.filter(e => e.event_type === 'poo').length,
      sleep: evts.filter(e => e.event_type === 'sleep').length,
      vitaminD: evts.filter(e => e.event_type === 'vitamin_d').length,
      evts,
    };
  };

  const stats = useMemo(() => {
    const last7Days = filterDays.slice().reverse();
    const dailyData = last7Days.map(day => ({ date: day, ...getDayStats(day) }));
    return { dailyData };
  }, [events, filterDays]);

  const selectedStats = useMemo(() => selectedDay ? getDayStats(selectedDay) : getDayStats(filterDays[0]), [selectedDay, events, filterDays]);

  useEffect(() => {
    if (!chartRef.current || !window.Chart || selectedDay) return;
    if (chartInstance.current) chartInstance.current.destroy();
    const ctx = chartRef.current.getContext('2d');
    const labels = stats.dailyData.map(d => ['א','ב','ג','ד','ה','ו','ש'][d.date.getDay()]);
    chartInstance.current = new window.Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'האכלות', data: stats.dailyData.map(d => d.feeds), backgroundColor: '#FF8FB1', borderRadius: 8 },
          { label: 'שאיבות', data: stats.dailyData.map(d => d.pumping), backgroundColor: '#64B5F6', borderRadius: 8 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { family: 'Heebo', size: 12 }, usePointStyle: true, padding: 12 } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Heebo', size: 11 } } },
          y: { beginAtZero: true, grid: { color: '#FFE8F0' }, ticks: { font: { family: 'Heebo', size: 11 }, precision: 0 } }
        }
      }
    });
    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [stats, selectedDay]);

  // Destroy chart when switching to day view
  useEffect(() => {
    if (selectedDay && chartInstance.current) { chartInstance.current.destroy(); chartInstance.current = null; }
  }, [selectedDay]);

  const displayLabel = selectedDay
    ? (() => { const idx = filterDays.findIndex(d => d.getTime() === selectedDay.getTime()); return idx === 0 ? 'היום' : idx === 1 ? 'אתמול' : formatHebrewDate(selectedDay); })()
    : 'היום';

  return (
    <>
      {/* Day filter */}
      <div className="date-filter">
        <button className={`date-chip ${!selectedDay ? 'active' : ''}`} onClick={() => setSelectedDay(null)}>
          7 ימים
        </button>
        {filterDays.map((d, i) => (
          <button
            key={d.toISOString()}
            className={`date-chip ${selectedDay && selectedDay.getTime() === d.getTime() ? 'active' : ''}`}
            onClick={() => setSelectedDay(d)}
          >{dayLabel(d, i)}</button>
        ))}
      </div>

      {/* Day stats */}
      <div className="card">
        <div className="card-title">📊 {displayLabel}</div>
        <div className="stats-grid">
          <div className="stat-box">
            <div className="stat-value">{selectedStats.feeds}</div>
            <div className="stat-label">האכלות</div>
          </div>
          <div className="stat-box blue">
            <div className="stat-value">{selectedStats.pumping}</div>
            <div className="stat-label">שאיבות</div>
          </div>
          <div className="stat-box blue">
            <div className="stat-value">{selectedStats.pumpingMl}</div>
            <div className="stat-label">מ״ל נשאבו</div>
          </div>
          <div className="stat-box">
            <div className="stat-value">{selectedStats.pee + selectedStats.poo}</div>
            <div className="stat-label">החתלות</div>
          </div>
        </div>
        {selectedDay && (
          <div className="stats-grid" style={{ marginTop: 10 }}>
            <div className="stat-box">
              <div className="stat-value">{selectedStats.nursing}</div>
              <div className="stat-label">הנקות</div>
            </div>
            <div className="stat-box">
              <div className="stat-value">{selectedStats.bottle}</div>
              <div className="stat-label">בקבוקים</div>
            </div>
            <div className="stat-box">
              <div className="stat-value">{selectedStats.sleep}</div>
              <div className="stat-label">שינות</div>
            </div>
            <div className="stat-box">
              <div className="stat-value">{selectedStats.vitaminD}</div>
              <div className="stat-label">ויטמין D</div>
            </div>
          </div>
        )}
      </div>

      {/* Weekly chart - shown only in weekly view */}
      {!selectedDay && (
        <div className="card">
          <div className="card-title">📈 7 ימים אחרונים</div>
          <div className="chart-wrap">
            <canvas ref={chartRef}></canvas>
          </div>
        </div>
      )}

      {/* Daily breakdown - shown in day view */}
      {selectedDay && selectedStats.evts.length > 0 && (
        <div className="card">
          <div className="card-title">📋 פירוט {displayLabel}</div>
          {selectedStats.evts.map(e => {
            const cfg = EVENT_TYPES[e.event_type] || { label: e.event_type, icon: '•', color: '#888', bg: '#eee' };
            return (
              <div key={e.id} className="history-item">
                <div className="history-icon" style={{ background: cfg.bg, color: cfg.color }}>{cfg.icon}</div>
                <div className="history-content">
                  <div className="history-title">{cfg.label}{e.amount_ml ? ` · ${e.amount_ml} מ״ל` : ''}{e.side ? ` · ${e.side === 'right' ? 'ימני' : e.side === 'left' ? 'שמאלי' : 'שניהם'}` : ''}</div>
                  <div className="history-meta">{formatClock(e.started_at)}{e.duration_seconds ? ` · ${Math.floor(e.duration_seconds / 60)} ד׳` : ''}</div>
                </div>

      {selectedDay && selectedStats.evts.length === 0 && (

// ============== MAIN APP ==============
const ACTIVE_OWNER_KEY = 'baby_tracker_active_owner';

const App = () => {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [activeOwnerId, setActiveOwnerId] = useState(null);
  const [accessibleBabies, setAccessibleBabies] = useState([]);
  const [collaborators, setCollaborators] = useState([]);
  const [installPrompt, setInstallPrompt] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('home');
  const [events, setEvents] = useState([]);
  const [activeTimer, setActiveTimer] = useState(null);
  const [modalType, setModalType] = useState(null);
  const [editingEvent, setEditingEvent] = useState(null);
  const [toast, setToast] = useState(null);
  const [historyFilter, setHistoryFilter] = useState(null); // Date object or null
  const [settings, setSettings] = useState({
    feedReminder: false,
    pumpReminder: false,
    timerSound: true,
    vitaminDReminder: false,
    vitaminDTime: '08:00',
    mamaVitamins: null,
  });
  const reminderFiredRef = useRef({});
  const eventsRef = useRef([]);

  const isOwner = user && activeOwnerId === user.id;

  // Init: load local state + subscribe to auth changes
  useEffect(() => {
    const savedSettings = localStorage.getItem(SETTINGS_KEY);
    if (savedSettings) setSettings(JSON.parse(savedSettings));
    const savedTimer = localStorage.getItem('baby_tracker_active_timer');
    if (savedTimer) setActiveTimer(JSON.parse(savedTimer));

    supabase.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setLoading(false);
      if (window.location.hash.includes('access_token') ||
          window.location.search.includes('code=')) {
        window.history.replaceState(null, '', window.location.pathname);
      }
    }).catch(() => setLoading(false));

    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      setUser(session?.user ?? null);
      if (event === 'SIGNED_OUT') {
        setEvents([]);
        setProfile(null);
        setActiveOwnerId(null);
        setAccessibleBabies([]);
        setCollaborators([]);
      }
    });

    const handleInstallPrompt = (e) => {
      e.preventDefault();
      setInstallPrompt(e);
    };
    window.addEventListener('beforeinstallprompt', handleInstallPrompt);

    return () => {
      subscription.unsubscribe();
      window.removeEventListener('beforeinstallprompt', handleInstallPrompt);
    };
  }, []);

  // Discover accessible babies (self + accepted shares) when user changes
  useEffect(() => {
    if (!user) { setAccessibleBabies([]); setActiveOwnerId(null); return; }
    (async () => {
      // 1. Always self
      const babies = [{ owner_id: user.id, is_owner: true }];
      // 2. Accepted collaborations
      const { data: shares } = await supabase
        .from('baby_collaborators')
        .select('owner_id')
        .eq('collaborator_id', user.id)
        .eq('status', 'accepted');
      const ownerIds = new Set();
      (shares || []).forEach((r) => ownerIds.add(r.owner_id));
      // 3. Resolve owner profiles
      let profiles = [];
      const allIds = Array.from(new Set([user.id, ...ownerIds]));
      if (allIds.length) {
        const { data } = await supabase
          .from('profiles')
          .select('id, baby_name, full_name, email, avatar_url')
          .in('id', allIds);
        profiles = data || [];
      }
      const byId = new Map(profiles.map((p) => [p.id, p]));
      const list = [];
      list.push({ owner_id: user.id, is_owner: true, profile: byId.get(user.id) });
      ownerIds.forEach((id) => list.push({ owner_id: id, is_owner: false, profile: byId.get(id) }));
      setAccessibleBabies(list);

      const saved = localStorage.getItem(ACTIVE_OWNER_KEY);
      const valid = saved && list.some((b) => b.owner_id === saved);
      setActiveOwnerId(valid ? saved : user.id);
    })();
  }, [user]);

  // Persist active owner choice
  useEffect(() => {
    if (activeOwnerId) localStorage.setItem(ACTIVE_OWNER_KEY, activeOwnerId);
  }, [activeOwnerId]);

  // Load profile of the active baby owner
  useEffect(() => {
    if (!activeOwnerId) { setProfile(null); return; }
    supabase.from('profiles').select('*').eq('id', activeOwnerId).maybeSingle()
      .then(({ data }) => setProfile(data));
  }, [activeOwnerId]);

  // Load collaborators when the user is viewing their own baby
  useEffect(() => {
    if (!user || !isOwner) { setCollaborators([]); return; }
    supabase.from('baby_collaborators')
      .select('id, invited_email, status, created_at, accepted_at, collaborator_id')
      .eq('owner_id', user.id)
      .order('created_at', { ascending: false })
      .then(({ data }) => setCollaborators(data || []));
  }, [user, isOwner, activeOwnerId]);

  // Load events for the active baby
  useEffect(() => {
    if (activeOwnerId) loadEvents();
  }, [activeOwnerId]);

  const loadEvents = async () => {
    if (!activeOwnerId) return;
    const { data, error } = await supabase
      .from('events')
      .select('*')
      .eq('user_id', activeOwnerId)
      .order('started_at', { ascending: false })
      .limit(200);
    if (!error) {
      setEvents(data || []);
      eventsRef.current = data || [];
    }
  };

  // Reminder check: feed, pump, vitamin D, mama vitamins
  useEffect(() => {
    const check = () => {
      const now = new Date();
      const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      const todayKey = now.toDateString();
      const evts = eventsRef.current;

      if (settings.feedReminder) {
        const feeds = evts.filter(e => ['nursing', 'bottle'].includes(e.event_type));
        if (feeds.length > 0) {
          const last = feeds[0];
          const hours = (Date.now() - new Date(last.started_at).getTime()) / 3600000;
          const key = `feed_${last.id}`;
          if (hours >= 3 && !reminderFiredRef.current[key]) {
            reminderFiredRef.current[key] = true;
            playReminderSound();
            showToast('⏰ זמן להאכלה! 3 שעות עברו');
          }
        }
      }

      if (settings.pumpReminder) {
        const pumps = evts.filter(e => e.event_type === 'pumping');
        if (pumps.length > 0) {
          const last = pumps[0];
          const hours = (Date.now() - new Date(last.started_at).getTime()) / 3600000;
          const key = `pump_${last.id}`;
          if (hours >= 3 && !reminderFiredRef.current[key]) {
            reminderFiredRef.current[key] = true;
            playReminderSound();
            showToast('⏰ זמן לשאיבה! 3 שעות עברו');
          }
        }
      }

      if (settings.vitaminDReminder && settings.vitaminDTime && hhmm === settings.vitaminDTime) {
        const key = `vitd_${todayKey}`;
        if (!reminderFiredRef.current[key]) {
          const todayStart = new Date(); todayStart.setHours(0,0,0,0);
          const alreadyGiven = evts.some(e => e.event_type === 'vitamin_d' && new Date(e.started_at) >= todayStart);
          if (!alreadyGiven) {
            reminderFiredRef.current[key] = true;
            playReminderSound();
            showToast('⏰ זמן לתת ויטמין D לתינוקת!');
          }
        }
      }

      const mamaVitamins = settings.mamaVitamins || DEFAULT_MAMA_VITAMINS;
      mamaVitamins.forEach(v => {
        if (v.reminderOn && v.time && hhmm === v.time) {
          const key = `mama_${v.id}_${todayKey}`;
          if (!reminderFiredRef.current[key]) {
            const todayStart = new Date(); todayStart.setHours(0,0,0,0);
            const alreadyTook = evts.some(e => e.event_type === 'mama_vitamin' && e.notes === v.name && new Date(e.started_at) >= todayStart);
            if (!alreadyTook) {
              reminderFiredRef.current[key] = true;
              playReminderSound();
              showToast(`⏰ זמן לקחת ${v.name}!`);
            }
          }
        }
      });
    };

    check();
    const interval = setInterval(check, 60000);
    return () => clearInterval(interval);
  }, [settings]);

  const refreshCollaborators = async () => {
    if (!user) return;
    const { data } = await supabase.from('baby_collaborators')
      .select('id, invited_email, status, created_at, accepted_at, collaborator_id')
      .eq('owner_id', user.id)
      .order('created_at', { ascending: false });
    setCollaborators(data || []);
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  };

  const startTimer = (type) => {
    if (activeTimer) {
      showToast('יש כבר טיימר פעיל');
      return;
    }
    const timer = {
      type,
      startedAt: new Date().toISOString(),
      side: type === 'nursing' ? 'right' : null
    };
    setActiveTimer(timer);
    localStorage.setItem('baby_tracker_active_timer', JSON.stringify(timer));
    showToast(`טיימר ${EVENT_TYPES[type].label} התחיל`);
  };

  const stopTimer = async (side) => {
    if (!activeTimer) return;
    const endedAt = new Date();
    const startedAt = new Date(activeTimer.startedAt);
    const duration = Math.floor((endedAt - startedAt) / 1000);

    if (activeTimer.type === 'pumping') {
      // For pumping, prompt for amount
      const amount = prompt('כמה מ״ל נשאבו?');
      const event = {
        user_id: activeOwnerId,
        event_type: activeTimer.type,
        started_at: activeTimer.startedAt,
        ended_at: endedAt.toISOString(),
        duration_seconds: duration,
        side: side,
        amount_ml: amount ? parseInt(amount) : null
      };
      await supabase.from('events').insert([event]);
    } else {
      const event = {
        user_id: activeOwnerId,
        event_type: activeTimer.type,
        started_at: activeTimer.startedAt,
        ended_at: endedAt.toISOString(),
        duration_seconds: duration,
        side: activeTimer.type === 'nursing' ? side : null
      };
      await supabase.from('events').insert([event]);
    }

    if (settings.timerSound) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
        setTimeout(() => {
          const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
          o2.connect(g2); g2.connect(ctx.destination);
          o2.frequency.value = 1000; g2.gain.value = 0.1;
          o2.start(); o2.stop(ctx.currentTime + 0.15);
        }, 180);
      } catch(e) {}
    }

    setActiveTimer(null);
    localStorage.removeItem('baby_tracker_active_timer');
    showToast(`נשמר! ${formatTime(duration)}`);
    loadEvents();
  };

  const cancelTimer = () => {
    if (confirm('לבטל את הטיימר?')) {
      setActiveTimer(null);
      localStorage.removeItem('baby_tracker_active_timer');
    }
  };

  const quickAdd = async (type) => {
    const event = {
      user_id: activeOwnerId,
      event_type: type,
      started_at: new Date().toISOString()
    };
    await supabase.from('events').insert([event]);
    showToast(`${EVENT_TYPES[type].icon} ${EVENT_TYPES[type].label} נרשם`);
    loadEvents();
  };

  const addEvent = async (event) => {
    await supabase.from('events').insert([{ ...event, user_id: activeOwnerId }]);
    setModalType(null);
    showToast('נשמר בהצלחה');
    loadEvents();
  };

  const logMamaVitamin = async (vitaminName) => {
    await supabase.from('events').insert([{
      user_id: activeOwnerId,
      event_type: 'mama_vitamin',
      started_at: new Date().toISOString(),
      notes: vitaminName
    }]);
    showToast(`💜 ${vitaminName} נרשם`);
    loadEvents();
  };

  const deleteEvent = async (id) => {
    if (!confirm('למחוק את הרישום?')) return;
    await supabase.from('events').delete().eq('id', id);
    showToast('נמחק');
    loadEvents();
  };

  const updateEvent = async (patch) => {
    if (!editingEvent) return;
    const { error } = await supabase.from('events').update(patch).eq('id', editingEvent.id);
    if (error) {
      showToast('שגיאה בעדכון');
      return;
    }
    setEditingEvent(null);
    showToast('עודכן');
    loadEvents();
  };

  const logout = async () => {
    if (confirm('להתנתק?')) {
      localStorage.removeItem('baby_tracker_active_timer');
      setActiveTimer(null);
      await supabase.auth.signOut();
    }
  };

  const editBabyName = async () => {
    if (!isOwner) { showToast('רק הבעלים יכול לשנות'); return; }
    const next = prompt('שם התינוקת:', profile?.baby_name || '');
    if (next === null) return;
    const trimmed = next.trim();
    const { data, error } = await supabase
      .from('profiles')
      .upsert({ id: user.id, baby_name: trimmed || null }, { onConflict: 'id' })
      .select()
      .single();
    if (error) {
      showToast('שגיאה בשמירה');
    } else {
      setProfile(data);
      showToast('נשמר');
    }
  };

  const inviteCollaborator = async (email) => {
    if (!user) return;
    const cleaned = (email || '').trim().toLowerCase();
    if (!cleaned || !cleaned.includes('@')) {
      showToast('מייל לא תקין');
      return;
    }
    if (cleaned === (user.email || '').toLowerCase()) {
      showToast('לא ניתן להזמין את עצמך');
      return;
    }
    // Server-side trigger auto-accepts if a profile with this email already exists.
    const { data, error } = await supabase
      .from('baby_collaborators')
      .upsert({ owner_id: user.id, invited_email: cleaned }, { onConflict: 'owner_id,invited_email' })
      .select()
      .single();
    if (error) { showToast('שגיאה: ' + error.message); return; }
    showToast(data?.status === 'accepted' ? 'שותפ/ה התווסף/ה!' : 'הזמנה נשלחה');
    refreshCollaborators();
  };

  const removeCollaborator = async (id) => {
    if (!confirm('להסיר את השותף?')) return;
    const { error } = await supabase.from('baby_collaborators').delete().eq('id', id);
    if (error) { showToast('שגיאה'); return; }
    showToast('הוסר');
    refreshCollaborators();
  };

  const handleInstall = async () => {
    if (!installPrompt) return;
    installPrompt.prompt();
    await installPrompt.userChoice.catch(() => {});
    setInstallPrompt(null);
  };

  // Calculate last events for "time since"
  const lastByType = useMemo(() => {
    const result = {};
    for (const e of events) {
      if (!result[e.event_type]) result[e.event_type] = e;
    }
    return result;
  }, [events]);

  if (loading) {
    return <div className="loading">טוען... 💕</div>;
  }

  if (!user) {
    return <AuthScreen />;
  }

  // ============== RENDER VIEWS ==============
  const renderHome = () => (
    <>
      {activeTimer && (
        <ActiveTimer
          activeTimer={activeTimer}
          onStop={stopTimer}
          onCancel={cancelTimer}
        />
      )}

      <div className="quick-grid">
        <button className="quick-btn pink" onClick={() => activeTimer ? showToast('יש טיימר פעיל') : startTimer('nursing')}>
          <span className="quick-btn-icon">🤱</span>
          <div className="quick-btn-title">הנקה</div>
          <div className="quick-btn-sub">{lastByType.nursing ? timeSince(lastByType.nursing.started_at) : 'התחל טיימר'}</div>
        </button>
        <button className="quick-btn blue" onClick={() => activeTimer ? showToast('יש טיימר פעיל') : startTimer('pumping')}>
          <span className="quick-btn-icon">💧</span>
          <div className="quick-btn-title">שאיבה</div>
          <div className="quick-btn-sub">{lastByType.pumping ? timeSince(lastByType.pumping.started_at) : 'התחל טיימר'}</div>
        </button>
        <button className="quick-btn mix" onClick={() => setModalType('bottle')}>
          <span className="quick-btn-icon">🍼</span>
          <div className="quick-btn-title">בקבוק</div>
          <div className="quick-btn-sub">{lastByType.bottle ? timeSince(lastByType.bottle.started_at) : 'הוספה ידנית'}</div>
        </button>
        <button className="quick-btn cream" onClick={() => quickAdd('pee')}>
          <span className="quick-btn-icon">💛</span>
          <div className="quick-btn-title">פיפי</div>
          <div className="quick-btn-sub">{lastByType.pee ? timeSince(lastByType.pee.started_at) : 'הוספה מהירה'}</div>
        </button>
        <button className="quick-btn cream" onClick={() => quickAdd('poo')}>
          <span className="quick-btn-icon">💩</span>
          <div className="quick-btn-title">קקי</div>
          <div className="quick-btn-sub">{lastByType.poo ? timeSince(lastByType.poo.started_at) : 'הוספה מהירה'}</div>
        </button>
        <button className="quick-btn cream" onClick={() => quickAdd('vitamin_d')}>
          <span className="quick-btn-icon">💊</span>
          <div className="quick-btn-title">ויטמין D</div>
          <div className="quick-btn-sub">{lastByType.vitamin_d ? timeSince(lastByType.vitamin_d.started_at) : 'הוספה מהירה'}</div>
        </button>
        <button className="quick-btn mix" onClick={() => setModalType('sleep')}>
          <span className="quick-btn-icon">😴</span>
          <div className="quick-btn-title">שינה</div>
          <div className="quick-btn-sub">{lastByType.sleep ? timeSince(lastByType.sleep.started_at) : 'הוספה ידנית'}</div>
        </button>
      </div>

      <div className="card">
        <div className="card-title">🕐 פעילות אחרונה</div>
        {events.length === 0 ? (
          <div className="empty">
            <div className="empty-emoji">🌸</div>
            <div className="empty-text">עדיין אין רישומים<br/>התחילי במעקב על ידי לחיצה על אחד הכפתורים</div>
          </div>
        ) : (
          events.slice(0, 8).map(e => {
            const cfg = EVENT_TYPES[e.event_type];
            return (
              <div key={e.id} className="history-item">
                <div className="history-icon" style={{background: cfg.bg, color: cfg.color}}>{cfg.icon}</div>
                <div className="history-content" onClick={() => setEditingEvent(e)} style={{cursor: 'pointer'}}>
                  <div className="history-title">{cfg.label}{e.amount_ml ? ` · ${e.amount_ml} מ״ל` : ''}{e.side ? ` · ${e.side === 'right' ? 'ימני' : e.side === 'left' ? 'שמאלי' : 'שניהם'}` : ''}</div>
                  <div className="history-meta">{formatClock(e.started_at)}{e.duration_seconds ? ` · ${Math.floor(e.duration_seconds/60)} ד׳` : ''}</div>
                </div>
                <div className="history-time">{timeSince(e.started_at)}</div>
                <button className="history-edit" onClick={() => setEditingEvent(e)} aria-label="ערוך">✎</button>
                <button className="history-delete" onClick={() => deleteEvent(e.id)} aria-label="מחק">×</button>
              </div>
            );
          })
        )}
      </div>
    </>
  );

  const renderHistory = () => {
    // Build filter days
    const filterDays = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - i); return d;
    });
    const dayChipLabel = (d, i) => i === 0 ? 'היום' : i === 1 ? 'אתמול' : `${d.getDate()}/${d.getMonth() + 1}`;

    // Filter events by selected day
    const filteredEvents = historyFilter
      ? events.filter(e => { const d = new Date(e.started_at); d.setHours(0,0,0,0); return d.getTime() === historyFilter.getTime(); })
      : events;

    const grouped = {};
    filteredEvents.forEach(e => {
      const date = new Date(e.started_at);
      date.setHours(0,0,0,0);
      const key = date.toISOString();
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(e);
    });

    return (
      <>
        {/* Date filter chips */}
        <div className="date-filter">
          <button className={`date-chip ${!historyFilter ? 'active' : ''}`} onClick={() => setHistoryFilter(null)}>הכל</button>
          {filterDays.map((d, i) => (
            <button
              key={d.toISOString()}
              className={`date-chip ${historyFilter && historyFilter.getTime() === d.getTime() ? 'active' : ''}`}
              onClick={() => setHistoryFilter(d)}
            >{dayChipLabel(d, i)}</button>
          ))}
        </div>

        {Object.keys(grouped).length === 0 ? (
          <div className="card">
            <div className="empty">
              <div className="empty-emoji">📋</div>
              <div className="empty-text">{historyFilter ? 'אין רישומים ביום זה' : 'אין היסטוריה עדיין'}</div>
            </div>
          </div>
        ) : Object.entries(grouped).map(([dateKey, dayEvents]) => (
          <div key={dateKey} className="card">
            <div className="card-title">📅 {formatHebrewDate(new Date(dateKey))}</div>
            {dayEvents.map(e => {
              const cfg = EVENT_TYPES[e.event_type] || { label: e.event_type, icon: '•', color: '#888', bg: '#eee' };
              return (
                <div key={e.id} className="history-item">
                  <div className="history-icon" style={{background: cfg.bg, color: cfg.color}}>{cfg.icon}</div>
                  <div className="history-content" onClick={() => setEditingEvent(e)} style={{cursor: 'pointer'}}>
                    <div className="history-title">{cfg.label}{e.amount_ml ? ` · ${e.amount_ml} מ״ל` : ''}{e.side ? ` · ${e.side === 'right' ? 'ימני' : e.side === 'left' ? 'שמאלי' : 'שניהם'}` : ''}{e.notes && e.event_type === 'mama_vitamin' ? ` · ${e.notes}` : ''}</div>
                    <div className="history-meta">{formatClock(e.started_at)}{e.duration_seconds ? ` · ${Math.floor(e.duration_seconds/60)} ד׳` : ''}{e.notes && e.event_type !== 'mama_vitamin' ? ` · ${e.notes}` : ''}</div>
                  </div>
                  <button className="history-edit" onClick={() => setEditingEvent(e)} aria-label="ערוך">✎</button>
                  <button className="history-delete" onClick={() => deleteEvent(e.id)} aria-label="מחק">×</button>
                </div>
              );
            })}
          </div>
        ))}
      </>
    );
  };

  return (
    <>
      <div className="header">
        <h1>{profile?.baby_name || 'my baby'} 💕</h1>
        <div className="date">
          {formatHebrewDate(new Date())}
          {!isOwner && profile && <span style={{marginInlineStart: 8, padding: '2px 8px', background: 'rgba(255,255,255,0.5)', borderRadius: 10, fontSize: 11}}>שיתוף מ-{profile.full_name || profile.email}</span>}
        </div>
      </div>

      {view === 'home' && renderHome()}
      {view === 'stats' && <StatsView events={events} />}
      {view === 'history' && renderHistory()}
      {view === 'mama' && (
        <MamaVitaminsView
          events={events}
          onLogVitamin={logMamaVitamin}
          settings={settings}
          onUpdateSettings={setSettings}
        />
      )}
      {view === 'settings' && (
        <SettingsView
          user={user}
          profile={profile}
          isOwner={isOwner}
          accessibleBabies={accessibleBabies}
          activeOwnerId={activeOwnerId}
          onSwitchBaby={setActiveOwnerId}
          collaborators={collaborators}
          onInvite={inviteCollaborator}
          onRemoveCollaborator={removeCollaborator}
          settings={settings}
          onUpdateSettings={setSettings}
          onLogout={logout}
          onEditBabyName={editBabyName}
          installPrompt={installPrompt}
          onInstall={handleInstall}
        />
      )}

      <div className="bottom-nav">
        <button className={`nav-btn ${view === 'home' ? 'active' : ''}`} onClick={() => setView('home')}>
          <span className="nav-btn-icon">🏠</span>
          <span className="nav-btn-label">בית</span>
        </button>
        <button className={`nav-btn ${view === 'stats' ? 'active' : ''}`} onClick={() => setView('stats')}>
          <span className="nav-btn-icon">📊</span>
          <span className="nav-btn-label">סטטיסטיקה</span>
        </button>
        <button className={`nav-btn ${view === 'history' ? 'active' : ''}`} onClick={() => setView('history')}>
          <span className="nav-btn-icon">📋</span>
          <span className="nav-btn-label">היסטוריה</span>
        </button>
        <button className={`nav-btn ${view === 'mama' ? 'active' : ''}`} onClick={() => setView('mama')}>
          <span className="nav-btn-icon">💜</span>
          <span className="nav-btn-label">ויטמינים</span>
        </button>
        <button className={`nav-btn ${view === 'settings' ? 'active' : ''}`} onClick={() => setView('settings')}>
          <span className="nav-btn-icon">⚙️</span>
          <span className="nav-btn-label">הגדרות</span>
        </button>
      </div>

      {modalType && (
        <AddEventModal
          type={modalType}
          onSave={addEvent}
          onClose={() => setModalType(null)}
        />
      )}

      {editingEvent && (
        <EditEventModal
          event={editingEvent}
          onSave={updateEvent}
          onClose={() => setEditingEvent(null)}
        />
      )}

      {toast && <div className="toast">{toast}</div>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((err) => console.warn('SW registration failed', err));
  });
}
</script>
</body>
</html>
